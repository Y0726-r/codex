<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>にゃんこ節約カレンダー v7</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#fff7f0;color:#35251e;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}.app{max-width:520px;margin:auto;padding:16px}h1{font-size:24px}.card{background:white;border:1px solid #f0ddd2;border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 6px 18px #50321e14}.sub,.label{color:#7a6257;font-size:13px;line-height:1.5}.label{font-size:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#fffaf6;border-radius:16px;padding:12px}.value{font-size:20px;font-weight:800}.green{color:#238636}.orange{color:#d97706}.barw{height:14px;background:#f4e5dc;border-radius:99px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:linear-gradient(90deg,#7bd88f,#ffd166)}button{border:0;border-radius:999px;padding:10px 12px;font-weight:700;background:#ff9f8a;color:white}button.gray{background:#f2dfd4;color:#35251e}button.red{background:#ffe3e3;color:#9b2226}.row{display:flex;justify-content:space-between;align-items:center;gap:8px}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}.dow{text-align:center;font-size:12px;color:#7a6257}.day{min-height:60px;border:1px solid #f0ddd2;background:#fffaf6;color:#35251e;border-radius:14px;padding:5px;display:flex;flex-direction:column;justify-content:space-between}.empty{background:transparent;border:0}.sel{outline:3px solid #ff9f8a73;background:#fff1ea}.date{font-size:12px;color:#7a6257}.stamp{text-align:center;font-size:20px}.count{font-size:10px;color:#7a6257;text-align:center}.stamps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stampBtn{background:#fffaf6;color:#35251e;border:1px solid #f0ddd2;border-radius:14px;font-size:22px}.on{outline:3px solid #ff9f8a73;background:#fff1ea}input{width:100%;font-size:16px;padding:12px;border:1px solid #f0ddd2;border-radius:14px;margin-top:5px}.full{width:100%;margin-top:8px}.praise{background:linear-gradient(135deg,#fff1ea,#fffbe8);border:2px solid #ffd166}.hero{text-align:center;font-size:34px}.pt{font-size:18px;font-weight:900}.pm{font-size:14px;line-height:1.7}.log{max-height:260px;overflow:auto}.li{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-bottom:1px solid #f7e8df;padding:7px 0}.pill{display:inline-block;background:#fff0e8;border-radius:99px;padding:3px 8px;font-size:12px}
</style>
</head>
<body><div class="app">
<h1>にゃんこ節約カレンダー v7</h1><div class="sub">残り予算を残り日数で割って、今日あと使える金額と守れた金額を出すにゃ。</div>
<div class="card"><div class="grid"><div class="box"><div class="label">今月使った金額</div><div class="value" id="spent">0</div></div><div class="box"><div class="label">残り予算</div><div class="value" id="left">0</div></div><div class="box"><div class="label">今日あと使える</div><div class="value orange" id="todayLimit">0</div></div><div class="box"><div class="label">今月守れた金額</div><div class="value green" id="savedMoney">0</div></div></div><div class="barw"><div class="bar" id="bar"></div></div><div class="sub" id="msg"></div></div>
<div class="card"><div class="grid"><label><div class="label">月予算</div><input id="budget" type="number" value="40000"></label><label><div class="label">貯蓄目標</div><input id="goal" type="number" value="20000"></label></div></div>
<div class="card"><div class="row"><button id="prev" class="gray">前月</button><b id="title"></b><button id="next" class="gray">翌月</button></div><div class="cal" id="cal"></div></div>
<div class="card praise"><div class="hero" id="hero">🐟</div><div class="pt" id="praiseTitle">今日の判定</div><div class="pm" id="praiseMsg"></div></div>
<div class="card"><b>選んだ日：<span id="selected"></span></b><div class="sub">買い物ごとに追加できるにゃ。</div><div class="stamps"><button class="stampBtn" data-s="💮">💮</button><button class="stampBtn" data-s="🐟">🐟</button><button class="stampBtn" data-s="✨">✨</button><button class="stampBtn" data-s="😿">😿</button><button class="stampBtn" data-s="🍱">🍱</button><button class="stampBtn" data-s="☕">☕</button><button class="stampBtn" data-s="🛒">🛒</button><button class="stampBtn" data-s="">なし</button></div><div class="sub">選択中：<span id="picked">なし</span></div><label><div class="label">この明細の出費</div><input id="amount" type="number" inputmode="numeric" placeholder="例：647"></label><label><div class="label">メモ</div><input id="memo" type="text" placeholder="例：やよいちゃんトイレ砂"></label><button id="save" class="full">追加で記録する</button><button id="delDay" class="full red">この日の記録を全部消す</button></div>
<div class="card"><div class="row"><b>今月ログ</b><button id="clear" class="red">全部消す</button></div><div id="log" class="log"></div></div>
</div><script>
var K='nyankoSavingV4',raw={};try{raw=JSON.parse(localStorage.getItem(K)||'{}')}catch(e){}var data=norm(raw),now=new Date(),y=now.getFullYear(),m=now.getMonth(),selected=key(y,m,now.getDate()),stamp='';store();
function E(i){return document.getElementById(i)}function yen(n){return '¥'+Math.round(Number(n)||0).toLocaleString()}function key(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}function mk(){return y+'-'+String(m+1).padStart(2,'0')}function store(){localStorage.setItem(K,JSON.stringify(data))}
function norm(o){var out={};Object.keys(o||{}).forEach(function(k){var v=o[k];if(Array.isArray(v)){out[k]=v}else if(v&&typeof v==='object'){out[k]=[{id:String(Date.now())+k,amount:Number(v.amount)||0,memo:v.memo||'',stamp:v.stamp||''}]}});return out}
function arr(k){return Array.isArray(data[k])?data[k]:[]}function dayTotal(k){return arr(k).reduce(function(s,x){return s+(Number(x.amount)||0)},0)}function monthSpent(){var t=0,M=mk();Object.keys(data).forEach(function(k){if(k.indexOf(M)===0)t+=dayTotal(k)});return t}function lastStamp(k){var a=arr(k);for(var i=a.length-1;i>=0;i--){if(a[i].stamp)return a[i].stamp}return ''}
function remainingDays(){var today=new Date();if(y!==today.getFullYear()||m!==today.getMonth())return new Date(y,m+1,0).getDate();return Math.max(1,new Date(y,m+1,0).getDate()-today.getDate()+1)}
function dailyLimit(){return Math.max(0,((Number(E('budget').value)||40000)-monthSpent())/remainingDays())}
function protectedMoney(){return Math.max(0,(Number(E('budget').value)||40000)-monthSpent()-(Number(E('goal').value)||20000))}
function updatePraise(){var total=dayTotal(selected),limit=dailyLimit(),diff=limit-total;if(diff>=0){E('hero').textContent=diff>=3000?'🐱👑':diff>=1000?'🐟✨':'💮';E('praiseTitle').textContent='今日の節約成功にゃ！';E('praiseMsg').innerHTML='今日の使用額 '+yen(total)+'。今日あと使える目安より '+yen(diff)+' 守れたにゃ。みつき、未来のお金を残せててえらすぎる。'}else{E('hero').textContent='😿';E('praiseTitle').textContent='今日は使いすぎたにゃ';E('praiseMsg').innerHTML='今日は '+yen(Math.abs(diff))+' オーバー。でも記録できてるから明日調整できるにゃ。'}}
function renderCal(){var c=E('cal');c.innerHTML='';E('title').textContent=y+'年 '+(m+1)+'月';['日','月','火','水','木','金','土'].forEach(function(x){var d=document.createElement('div');d.className='dow';d.textContent=x;c.appendChild(d)});for(var i=0;i<new Date(y,m,1).getDay();i++){var em=document.createElement('div');em.className='day empty';c.appendChild(em)}var days=new Date(y,m+1,0).getDate();for(var d=1;d<=days;d++){var k=key(y,m,d),cnt=arr(k).length,b=document.createElement('button');b.type='button';b.className='day'+(k===selected?' sel':'');b.dataset.k=k;b.innerHTML='<span class=date>'+d+'</span><span class=stamp>'+lastStamp(k)+'</span><span class=count>'+(cnt?cnt+'件 '+yen(dayTotal(k)):'')+'</span>';c.appendChild(b)}}
function renderStats(){var spent=monthSpent(),budget=Number(E('budget').value)||40000,left=budget-spent;E('spent').textContent=yen(spent);E('left').textContent=left>=0?yen(left):'-'+yen(Math.abs(left));E('todayLimit').textContent=yen(dailyLimit());E('savedMoney').textContent=yen(protectedMoney());E('bar').style.width=Math.min(100,spent/budget*100)+'%';E('msg').textContent=protectedMoney()>0?'今月守れた金額が出てるにゃ。積み上がってる。':spent<=budget?'まだ予算内にゃ。ここから守る。':'予算オーバー中にゃ。';var h='',M=mk();Object.keys(data).sort().forEach(function(k){if(k.indexOf(M)===0)arr(k).forEach(function(v){h+='<div class=li><div><span class=pill>'+k+'</span> '+(v.stamp||'')+' '+(v.memo||'メモなし')+' '+(v.amount?yen(v.amount):'')+'</div><button class=gray data-day='+k+' data-id='+v.id+'>削除</button></div>'})});E('log').innerHTML=h||'<div class=sub>まだ記録なしにゃ。</div>';updatePraise()}
function render(){E('selected').textContent=selected;E('picked').textContent=stamp||'なし';document.querySelectorAll('.stampBtn').forEach(function(b){b.classList.toggle('on',b.dataset.s===stamp)});renderCal();renderStats()}
E('cal').onclick=function(e){var b=e.target.closest('button[data-k]');if(!b)return;selected=b.dataset.k;E('amount').value='';E('memo').value='';render()};document.querySelectorAll('.stampBtn').forEach(function(b){b.onclick=function(){stamp=b.dataset.s;render()}});
E('save').onclick=function(){if(!data[selected])data[selected]=[];var a=Number(E('amount').value)||0;data[selected].push({id:String(Date.now())+Math.random().toString(16).slice(2),amount:a,memo:E('memo').value.trim(),stamp:stamp||(a>0?'🛒':'💮')});store();E('amount').value='';E('memo').value='';render()};
E('delDay').onclick=function(){if(arr(selected).length&&confirm('この日の記録を全部消すにゃ？')){delete data[selected];store();render()}};E('clear').onclick=function(){var M=mk(),ks=Object.keys(data).filter(function(k){return k.indexOf(M)===0});if(ks.length&&confirm('今月ログを全部消すにゃ？')){ks.forEach(function(k){delete data[k]});store();render()}};E('log').onclick=function(e){var b=e.target.closest('button[data-id]');if(!b)return;var k=b.dataset.day,id=b.dataset.id;if(confirm('この明細を消すにゃ？')){data[k]=arr(k).filter(function(x){return x.id!==id});if(!data[k].length)delete data[k];store();render()}};
E('prev').onclick=function(){m--;if(m<0){m=11;y--}selected=key(y,m,1);render()};E('next').onclick=function(){m++;if(m>11){m=0;y++}selected=key(y,m,1);render()};E('budget').oninput=renderStats;E('goal').oninput=renderStats;render();
</script></body></html>
