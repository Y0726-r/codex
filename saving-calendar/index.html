<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にゃんこ節約カレンダー v3</title>
<style>
:root{--bg:#fff7f0;--card:#fff;--text:#35251e;--sub:#7a6257;--accent:#ff9f8a;--accent2:#ffd166;--good:#7bd88f;--line:#f0ddd2;--danger:#ffe3e3;--dangerText:#9b2226}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text)}.app{max-width:520px;margin:0 auto;padding:18px}h1{font-size:24px;margin:8px 0 4px}.subtitle,.mini{color:var(--sub);font-size:13px;line-height:1.5}.subtitle{margin-bottom:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 20px rgba(80,50,30,.08);margin-bottom:14px}.stats,.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#fffaf6;border-radius:16px;padding:12px}.label{color:var(--sub);font-size:12px}.value{font-weight:800;font-size:20px;margin-top:4px}.progress{height:14px;background:#f4e5dc;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--good),var(--accent2));transition:.25s}.monthRow,.logHead{display:flex;align-items:center;justify-content:space-between;gap:8px}button{border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:700;padding:10px 14px;cursor:pointer}button.secondary{background:#f2dfd4;color:var(--text)}button.danger{background:var(--danger);color:var(--dangerText)}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:12px}.dow{text-align:center;font-size:12px;color:var(--sub);padding:4px 0}.day{min-height:58px;background:#fffaf6;border:1px solid var(--line);border-radius:14px;padding:6px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}.day.empty{background:transparent;border:0;cursor:default}.date{font-size:12px;color:var(--sub)}.stamp{font-size:24px;text-align:center;line-height:1}.selected{outline:3px solid rgba(255,159,138,.45);background:#fff1ea}.stampPicker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stampBtn{background:#fffaf6;border:1px solid var(--line);color:var(--text);font-size:22px;border-radius:16px;padding:10px}input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;margin-top:6px}.log{max-height:210px;overflow:auto;font-size:14px;line-height:1.8}.pill{display:inline-block;background:#fff0e8;border-radius:999px;padding:4px 9px;margin:3px 3px 0 0;font-size:12px}.logItem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-bottom:1px solid #f7e8df;padding:6px 0}.smallDel{padding:6px 10px;font-size:12px;background:#f2dfd4;color:var(--text)}
</style>
</head>
<body>
<div class="app">
<h1>🐱 にゃんこ節約カレンダー</h1>
<div class="subtitle">使わなかった日を、ちゃんと勝ちにするアプリにゃ。v3</div>
<div class="card"><div class="stats"><div class="stat"><div class="label">今月使った金額</div><div class="value" id="spent">¥0</div></div><div class="stat"><div class="label">残り予算</div><div class="value" id="left">¥40,000</div></div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="mini" id="message">今日も財布を守るにゃ。</div></div>
<div class="card"><div class="row"><label><span class="label">月予算</span><input id="budget" type="number" value="40000"></label><label><span class="label">貯蓄目標</span><input id="savingGoal" type="number" value="20000"></label></div><div class="mini">月4万円まで・目標2万円貯蓄で初期設定済みにゃ。</div></div>
<div class="card"><div class="monthRow"><button class="secondary" id="prev">‹ 前月</button><strong id="monthTitle"></strong><button class="secondary" id="next">翌月 ›</button></div><div class="calendar" id="calendar"></div></div>
<div class="card"><strong>選んだ日：<span id="selectedText">今日</span></strong><div class="mini">日付を選んで、金額とメモを入れて「記録する」にゃ。</div><div class="stampPicker"><button class="stampBtn" data-stamp="🐟">🐟</button><button class="stampBtn" data-stamp="💮">💮</button><button class="stampBtn" data-stamp="✨">✨</button><button class="stampBtn" data-stamp="😿">😿</button><button class="stampBtn" data-stamp="🍱">🍱</button><button class="stampBtn" data-stamp="☕">☕</button><button class="stampBtn" data-stamp="🛒">🛒</button><button class="stampBtn" data-stamp="">消す</button></div><label style="display:block;margin-top:12px"><span class="label">この日の出費</span><input id="amount" type="number" inputmode="numeric" placeholder="例：647"></label><label style="display:block;margin-top:8px"><span class="label">メモ</span><input id="memo" type="text" placeholder="例：やよいちゃんトイレ砂"></label><button id="save" style="width:100%;margin-top:10px">記録する</button><button id="deleteSelected" class="danger" style="width:100%;margin-top:8px">この日の記録を消す</button></div>
<div class="card"><div class="logHead"><strong>今月ログ</strong><button id="clearMonth" class="danger">今月ログを全部消す</button></div><div class="log" id="log"></div></div>
</div>
<script>
(function(){
const yen=n=>"¥"+Math.max(0,Math.round(Number(n)||0)).toLocaleString();
const $=id=>document.getElementById(id);
const today=new Date();let current=new Date(today.getFullYear(),today.getMonth(),1);let selectedKey=keyOf(today.getFullYear(),today.getMonth(),today.getDate());
let data={};try{data=JSON.parse(localStorage.getItem("nyankoBudgetApp")||"{}")}catch(e){data={}}
function keyOf(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")}
function monthKey(){return current.getFullYear()+"-"+String(current.getMonth()+1).padStart(2,"0")}
function saveData(){localStorage.setItem("nyankoBudgetApp",JSON.stringify(data))}
function setFormFromSelected(){const item=data[selectedKey]||{};$("selectedText").textContent=selectedKey;$("amount").value=item.amount||"";$("memo").value=item.memo||""}
function renderCalendar(){const cal=$("calendar");cal.innerHTML="";const y=current.getFullYear(),m=current.getMonth();$("monthTitle").textContent=y+"年 "+(m+1)+"月";["日","月","火","水","木","金","土"].forEach(d=>{const el=document.createElement("div");el.className="dow";el.textContent=d;cal.appendChild(el)});const first=new Date(y,m,1).getDay();const days=new Date(y,m+1,0).getDate();for(let i=0;i<first;i++){const e=document.createElement("div");e.className="day empty";cal.appendChild(e)}for(let d=1;d<=days;d++){const key=keyOf(y,m,d);const item=data[key]||{};const el=document.createElement("button");el.type="button";el.className="day"+(key===selectedKey?" selected":"");el.dataset.key=key;el.innerHTML='<div class="date">'+d+'</div><div class="stamp">'+(item.stamp||"")+'</div>';cal.appendChild(el)}}
function renderStats(){const mk=monthKey();const entries=Object.entries(data).filter(([k])=>k.startsWith(mk));const spent=entries.reduce((s,[,v])=>s+(Number(v.amount)||0),0);const b=Number($("budget").value)||40000;const goal=Number($("savingGoal").value)||20000;const left=b-spent;$("spent").textContent=yen(spent);$("left").textContent=left>=0?yen(left):"−"+yen(Math.abs(left));$("bar").style.width=Math.min(100,(spent/b)*100)+"%";$("message").textContent=spent<=b-goal?"神。貯蓄目標ペースに乗ってるにゃ。みつきえらすぎ案件。":spent<=b?"まだ予算内にゃ。ここから守れば勝てる。":"予算オーバーにゃ。でも記録してる時点で立て直せる。";$("log").innerHTML=entries.sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>'<div class="logItem"><div><span class="pill">'+k+'</span> '+(v.stamp||"")+' '+(v.memo||"メモなし")+' '+(v.amount?yen(v.amount):"")+'</div><button type="button" class="smallDel" data-delete="'+k+'">削除</button></div>').join("")||"<div class='mini'>まだ記録なしにゃ。</div>"}
function render(){renderCalendar();setFormFromSelected();renderStats()}
$("calendar").addEventListener("click",e=>{const day=e.target.closest(".day:not(.empty)");if(!day)return;selectedKey=day.dataset.key;setFormFromSelected();renderCalendar()});
document.querySelectorAll(".stampBtn").forEach(btn=>btn.addEventListener("click",()=>{data[selectedKey]=data[selectedKey]||{};data[selectedKey].stamp=btn.dataset.stamp;saveData();render()}));
$("save").addEventListener("click",()=>{data[selectedKey]=data[selectedKey]||{};data[selectedKey].amount=Number($("amount").value)||0;data[selectedKey].memo=$("memo").value.trim();if(!data[selectedKey].stamp)data[selectedKey].stamp=data[selectedKey].amount>0?"🛒":"💮";saveData();render()});
$("deleteSelected").addEventListener("click",()=>{if(!data[selectedKey])return;if(confirm("この日の記録を消すにゃ？")){delete data[selectedKey];saveData();render()}});
$("clearMonth").addEventListener("click",()=>{const mk=monthKey();const keys=Object.keys(data).filter(k=>k.startsWith(mk));if(!keys.length)return;if(confirm("今月ログを全部消すにゃ？")){keys.forEach(k=>delete data[k]);saveData();render()}});
$("log").addEventListener("click",e=>{const btn=e.target.closest("button[data-delete]");if(!btn)return;const key=btn.dataset.delete;if(confirm(key+" の記録を消すにゃ？")){delete data[key];saveData();render()}});
$("prev").addEventListener("click",()=>{current.setMonth(current.getMonth()-1);selectedKey=keyOf(current.getFullYear(),current.getMonth(),1);render()});
$("next").addEventListener("click",()=>{current.setMonth(current.getMonth()+1);selectedKey=keyOf(current.getFullYear(),current.getMonth(),1);render()});
$("budget").addEventListener("input",renderStats);$("savingGoal").addEventListener("input",renderStats);
render();
})();
</script>
</body>
</html>
